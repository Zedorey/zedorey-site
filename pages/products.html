<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products - Zedorey</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/products.css" />
</head>
<body>

  <nav class="nav scrolled" id="nav">
    <div class="nav-left">
      <a href="products.html" class="nav-link active">Products</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </div>
    <a href="../index.html" class="nav-logo">Zedorey</a>
    <div class="nav-right">
      <button class="nav-cart-btn" id="cartBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </nav>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <span class="cart-title">Your Cart</span>
      <button class="cart-close" id="cartClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty"><span>Your cart is empty</span></div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-amount" id="cartTotal">$0.00</span>
      </div>
      <a href="#" class="btn-checkout" id="checkoutBtn">Proceed to Checkout</a>
    </div>
  </div>

  <section class="products-hero">
    <div class="products-hero-inner">
      <span class="section-label">From The Store</span>
      <h1 class="products-hero-title">All Products</h1>
    </div>
  </section>

  <section class="products-filter-bar">
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="drop">The Drop</button>
      <button class="filter-tab" data-filter="essentials">ZDRY Essentials</button>
    </div>
  </section>

  <section class="products-main">
    <div class="products-grid-full" id="productsGrid">
      <div class="product-skeleton"></div>
      <div class="product-skeleton"></div>
      <div class="product-skeleton"></div>
      <div class="product-skeleton"></div>
    </div>
  </section>

  <div class="marquee-track" style="margin-top:80px">
    <div class="marquee-inner" id="marqueeInner"></div>
  </div>

  <footer class="footer">
    <nav class="footer-nav">
      <a href="products.html" class="footer-nav-link">Products</a>
      <a href="about.html" class="footer-nav-link">About</a>
      <a href="contact.html" class="footer-nav-link">Contact</a>
    </nav>
    <div class="footer-logo">Zedorey</div>
    <p class="footer-copy">© 2026 Zedorey. All rights reserved.</p>
  </footer>

  <script src="../js/shopify.js"></script>
  <script src="../js/products.js"></script>
</body>
</html>
